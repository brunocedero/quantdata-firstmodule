# Modern data stack local: Postgres (warehouse) + Airflow (orquestación).
# dbt corre dentro del contenedor de Airflow, así que no necesita un servicio aparte.
x-airflow-common: &airflow-common
  build: .                      # construye la imagen del Dockerfile local (deps preinstaladas)
  image: quant-airflow:latest   # nombre de la imagen ya construida
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-meta/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    # Credenciales del warehouse y la API, leídas desde .env
    WAREHOUSE_HOST: postgres-dw
    WAREHOUSE_DB: quant
    WAREHOUSE_USER: quant
    WAREHOUSE_PASSWORD: quant
    TIINGO_API_KEY: ${TIINGO_API_KEY}
    # /opt/airflow/include en el path para poder hacer `from ingestion.load import ...`
    PYTHONPATH: /opt/airflow/include
    DBT_LOG_PATH: /opt/airflow/logs/dbt
    DBT_TARGET_PATH: /opt/airflow/dbt_artifacts/target
  volumes:
    - ./dags:/opt/airflow/dags
    - ./include:/opt/airflow/include
    - ./dbt:/opt/airflow/dbt_project
    - dbt-artifacts:/opt/airflow/dbt_artifacts
    - ./plugins:/opt/airflow/plugins
    - airflow-logs:/opt/airflow/logs   # volumen gestionado por Docker
  depends_on:
    postgres-meta:
      condition: service_healthy

services:
  # Base de datos interna de Airflow (sus metadatos). No la toques desde dbt.
  postgres-meta:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - pg-meta:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  # El warehouse de verdad: acá viven raw / staging / marts.
  postgres-dw:
    image: postgres:16
    environment:
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: quant
      POSTGRES_DB: quant
    ports:
      - "5433:5432"   # exponé 5433 en tu host para conectarte con DBeaver/psql
    volumes:
      - pg-dw:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "quant"]
      interval: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create --username admin --password admin \
          --firstname admin --lastname admin --role Admin --email admin@example.com
    restart: on-failure

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  pg-meta:
  pg-dw:
  airflow-logs:
  dbt-artifacts: